<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="pair">
  <div class="msg user">
    <div class="msg-label">You</div>
    <div class="msg-bubble" th:text="${userMessage}"></div>
  </div>
  <div class="msg assistant">
    <div class="msg-label">Loom</div>
    <div class="msg-bubble" th:text="${assistantMessage}"></div>
  </div>
</th:block>

</body>
</html>
